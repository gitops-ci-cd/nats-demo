services:
  npm: &npm
    profiles: [tasks]
    env_file:
      - path: .env
        required: false
    tty: true
    stdin_open: true
    build:
      context: .
      target: base
    entrypoint: npm
    command: help
    volumes:
      - .:/usr/src/app:delegated
      - node_modules:/usr/src/app/node_modules:cached

  nats:
    profiles: [tasks]
    image: nats:2
    tty: true
    stdin_open: true
    entrypoint: nats
    command: --help
    environment:
      NATS_URL: nats://broker:4222

  broker:
    image: nats:2
    command:
      - "-c"
      - "/etc/nats/nats.conf"
      - "--http_port=8222"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
      - ./nats.conf:/etc/nats/nats.conf:ro

  publisher:
    build: .
    depends_on:
      - broker
    environment:
      NATS_URL: nats://broker:4222
    command: ["npm", "run", "publisher"]

  subscriber:
    build: .
    depends_on:
      - broker
    environment:
      NATS_URL: nats://broker:4222
    command: ["npm", "run", "subscriber"]

  rpc-server:
    build: .
    depends_on:
      - broker
    environment:
      NATS_URL: nats://broker:4222
    command: ["npm", "run", "rpc-server"]

  rpc-client:
    build: .
    depends_on:
      - broker
    environment:
      NATS_URL: nats://broker:4222
    command: ["npm", "run", "rpc-client"]

  js-publisher:
    build: .
    depends_on:
      - broker
    environment:
      NATS_URL: nats://broker:4222
    command: ["npm", "run", "js-publisher"]

  js-worker:
    build: .
    depends_on:
      - broker
    environment:
      NATS_URL: nats://broker:4222
    command: ["npm", "run", "js-worker"]

volumes:
  nats_data:
  node_modules:
