services:
  npm: &npm
    profiles: [tasks]
    env_file:
      - path: .env
        required: false
    tty: true
    stdin_open: true
    build:
      context: .
      target: base
    entrypoint: npm
    command: help
    volumes:
      - .:/usr/src/app:delegated
      - node_modules:/usr/src/app/node_modules:cached

  nk:
    profiles: [tasks]
    image: natsio/nats-box:latest
    tty: true
    stdin_open: true
    entrypoint: nk
    command: --help

  nsc:
    profiles: [tasks]
    image: natsio/nats-box:latest
    tty: true
    stdin_open: true
    entrypoint: nsc
    command: --help
    environment:
      NSC_HOME: /nsc
      NKEYS_PATH: /nsc/nkeys
    volumes:
      - ./.nsc:/nsc
      - ./scripts:/scripts:ro

  nats:
    profiles: [tasks]
    image: natsio/nats-box:latest
    tty: true
    stdin_open: true
    entrypoint: nats
    command: --help
    environment:
      NATS_URL: nats://broker:4222
      NATS_CREDS: /nsc/nkeys/creds/Demo/Agents/demo-client.creds
    volumes:
      - ./.nsc:/nsc:ro

  broker:
    image: nats:2
    command:
      - "-c"
      - "/etc/nats/nats.conf"
      - "--http_port=8222"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
      - ./nats.conf:/etc/nats/nats.conf:ro
      - ./resolver.conf:/etc/nats/resolver.conf:ro
      - nats_jwt:/jwt

  publisher:
    build: .
    depends_on:
      - broker
    env_file:
      - path: .env
        required: false
    environment:
      NATS_URL: nats://broker:4222
    command: ["npm", "run", "publisher"]

  subscriber:
    build: .
    depends_on:
      - broker
    env_file:
      - path: .env
        required: false
    environment:
      NATS_URL: nats://broker:4222
    command: ["npm", "run", "subscriber"]

  rpc-server:
    build: .
    depends_on:
      - broker
    env_file:
      - path: .env
        required: false
    environment:
      NATS_URL: nats://broker:4222
    command: ["npm", "run", "rpc-server"]

  rpc-client:
    build: .
    depends_on:
      - broker
    env_file:
      - path: .env
        required: false
    environment:
      NATS_URL: nats://broker:4222
    command: ["npm", "run", "rpc-client"]

  js-publisher:
    build: .
    depends_on:
      - broker
    env_file:
      - path: .env
        required: false
    environment:
      NATS_URL: nats://broker:4222
    command: ["npm", "run", "js-publisher"]

  js-worker:
    build: .
    depends_on:
      - broker
    env_file:
      - path: .env
        required: false
    environment:
      NATS_URL: nats://broker:4222
    command: ["npm", "run", "js-worker"]

volumes:
  nats_data:
  nats_jwt:
  node_modules:
